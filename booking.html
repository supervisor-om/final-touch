<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="cache-control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>حجز موعد — اللمسة الأخيرة</title>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0f3460">
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;900&family=Tajawal:wght@300;400;500;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --primary:#1a1a2e; --secondary:#16213e; --accent:#e94560; --gold:#f5a623;
  --success:#00d4aa; --info:#4facfe; --warning:#f5a623; --danger:#e94560;
  --surface:#0f3460; --card:rgba(255,255,255,0.05); --border:rgba(255,255,255,0.1);
  --text:#eaeaea; --muted:#8892a4; --font-main:'Cairo',sans-serif; --font-display:'Tajawal',sans-serif;
  --radius:16px;
}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--font-main);background:var(--primary);color:var(--text);min-height:100vh;direction:rtl;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 50%,rgba(233,69,96,.08) 0%,transparent 50%),radial-gradient(ellipse at 80% 20%,rgba(79,172,254,.08) 0%,transparent 50%);pointer-events:none;z-index:0;}
.header{padding:20px 0;text-align:center;border-bottom:1px solid var(--border);background:rgba(15,52,96,.5);backdrop-filter:blur(10px);position:relative;z-index:1;}
.logo-img{width:90px;height:90px;object-fit:contain;display:block;margin:0 auto 8px;filter:drop-shadow(0 4px 20px rgba(233,69,96,.5));}
.brand{font-family:var(--font-display);font-size:24px;font-weight:900;}
.brand-sub{font-size:13px;color:var(--muted);margin-top:2px;}
.wrap{max-width:640px;margin:0 auto;padding:24px 16px;position:relative;z-index:1;}
.steps{display:flex;justify-content:center;gap:8px;margin-bottom:24px;flex-wrap:wrap;}
.step{display:flex;align-items:center;gap:6px;padding:8px 16px;border-radius:24px;background:rgba(255,255,255,.05);border:1px solid var(--border);font-size:13px;font-weight:700;color:var(--muted);transition:all .3s;}
.step.active{background:linear-gradient(135deg,var(--accent),#ff6b35);color:#fff;border-color:transparent;}
.step.done{background:rgba(0,212,170,.1);border-color:rgba(0,212,170,.3);color:var(--success);}
.card{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);margin-bottom:16px;overflow:hidden;backdrop-filter:blur(10px);}
.card-header{padding:16px 20px;border-bottom:1px solid var(--border);font-size:15px;font-weight:800;}
.card-body{padding:20px;}
.services-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;}
.svc-btn{padding:28px 16px;border:2px solid var(--border);background:rgba(255,255,255,.04);border-radius:14px;color:var(--text);font-family:var(--font-main);font-size:18px;font-weight:700;cursor:pointer;transition:all .2s;text-align:center;position:relative;}
.svc-btn:hover{border-color:rgba(255,255,255,.2);background:rgba(255,255,255,.07);}
.svc-btn.selected{border-color:var(--accent);background:rgba(233,69,96,.1);box-shadow:0 4px 15px rgba(233,69,96,.15);}
.svc-btn .svc-emoji{font-size:36px;display:block;margin-bottom:8px;}
.svc-btn .svc-name{font-size:16px;display:block;}
.week-grid{display:grid;grid-template-columns:1fr;gap:12px;margin-top:12px;}
@media(min-width:500px){.week-grid{grid-template-columns:repeat(2,1fr);}}
.week-card{padding:16px;border:1px solid var(--border);background:rgba(255,255,255,.04);border-radius:14px;cursor:pointer;transition:all .2s;position:relative;text-align:center;}
.week-card:hover{border-color:rgba(79,172,254,.4);background:rgba(79,172,254,.05);}
.week-card.selected{border-color:var(--success);background:rgba(0,212,170,.08);box-shadow:0 4px 15px rgba(0,212,170,.1);}
.week-card.full{opacity:.6;cursor:not-allowed;border-color:rgba(233,69,96,.2);background:rgba(233,69,96,.03);}
.week-card .wk-label{font-size:11px;color:var(--muted);font-weight:700;margin-bottom:4px;}
.week-card .wk-range{font-size:14px;font-weight:800;margin-bottom:4px;}
.week-card .wk-range-sub{font-size:13px;color:var(--muted);margin-bottom:10px;}
.week-card .wk-cars{display:flex;justify-content:center;gap:6px;margin-bottom:10px;}
.wk-car-dot{width:14px;height:14px;border-radius:50%;border:1px solid var(--border);}
.wk-car-dot.taken{background:var(--success);border-color:var(--success);}
.wk-car-dot.wait{background:var(--gold);border-color:var(--gold);}
.wk-car-dot.empty{background:transparent;}
.week-card .wk-status{font-size:12px;font-weight:700;margin-top:4px;}
.week-card .wk-free{color:var(--success);}
.week-card .wk-full{color:var(--danger);}
.queue-box{display:none;background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.25);border-radius:12px;padding:16px;margin:16px 0;text-align:center;}
.queue-box.show{display:block;}
.queue-num{font-family:var(--font-display);font-size:36px;font-weight:900;color:var(--success);}
.queue-total{font-size:14px;color:var(--muted);}
.queue-wait{background:rgba(245,166,35,.08);border-color:rgba(245,166,35,.25);}
.queue-wait .queue-num{color:var(--gold);}
.form-grid{display:grid;grid-template-columns:1fr;gap:14px;}
@media(min-width:500px){.form-grid{grid-template-columns:1fr 1fr;}.form-group.full{grid-column:1/-1;}}
.form-group{display:flex;flex-direction:column;gap:6px;}
input,textarea{background:rgba(255,255,255,.05);border:1px solid var(--border);border-radius:10px;padding:12px 14px;color:var(--text);font-family:var(--font-main);font-size:14px;transition:border-color .2s;width:100%;direction:rtl;}
input:focus,textarea:focus{outline:none;border-color:var(--accent);background:rgba(233,69,96,.05);}
textarea{resize:vertical;min-height:70px;}
.btn{padding:13px 24px;border:none;border-radius:12px;font-family:var(--font-main);font-size:15px;font-weight:800;cursor:pointer;transition:all .2s;width:100%;text-align:center;}
.btn-primary{background:linear-gradient(135deg,var(--accent),#ff6b35);color:#fff;box-shadow:0 6px 20px rgba(233,69,96,.3);}
.btn-primary:hover{transform:translateY(-2px);box-shadow:0 8px 28px rgba(233,69,96,.4);}
.btn-primary:disabled{background:rgba(255,255,255,.1);color:var(--muted);box-shadow:none;cursor:not-allowed;transform:none;}
.btn-back{background:rgba(255,255,255,.06);border:1px solid var(--border);color:var(--text);}
.btn-back:hover{background:rgba(255,255,255,.11);}
.back-link{color:var(--muted);font-size:13px;text-decoration:none;display:inline-flex;align-items:center;gap:6px;margin-bottom:12px;}
.back-link:hover{color:var(--text);}
.step-content{display:none;animation:fadeIn .3s ease;}
.step-content.active{display:block;}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.sum-row{display:flex;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);font-size:14px;}
.sum-row:last-child{border-bottom:none;}
.sum-label{color:var(--muted);}
.sum-val{font-weight:700;}
.confirm-card{background:rgba(0,212,170,.08);border:1px solid rgba(0,212,170,.25);border-radius:var(--radius);padding:30px;text-align:center;}
.confirm-emoji{font-size:48px;margin-bottom:12px;}
.confirm-title{font-size:20px;font-weight:900;margin-bottom:6px;}
.confirm-sub{font-size:14px;color:var(--muted);margin-bottom:16px;}
.booking-id{font-family:var(--font-display);font-size:28px;font-weight:900;color:var(--success);letter-spacing:2px;background:rgba(0,212,170,.1);padding:10px 24px;border-radius:12px;display:inline-block;margin-bottom:16px;border:1px dashed var(--success);}
.whatsapp-btn{display:inline-flex;align-items:center;gap:8px;padding:12px 20px;background:linear-gradient(135deg,#25d366,#128c7e);color:#fff;border-radius:12px;text-decoration:none;font-weight:700;font-size:14px;transition:all .2s;margin-top:10px;}
.whatsapp-btn:hover{transform:translateY(-2px);box-shadow:0 6px 20px rgba(37,211,102,.3);}
.flash{position:fixed;top:20px;left:50%;transform:translateX(-50%);padding:12px 24px;border-radius:12px;font-size:14px;font-weight:700;z-index:300;display:none;}
.flash.show{display:block;}
.flash.success{background:rgba(0,212,170,.15);border:1px solid var(--success);color:var(--success);}
.flash.error{background:rgba(233,69,96,.15);border:1px solid var(--danger);color:var(--danger);}
.warn-box{background:rgba(245,166,35,.08);border:1px solid rgba(245,166,35,.25);border-radius:10px;padding:12px 16px;margin:16px 0;font-size:13px;color:var(--warning);text-align:center;}
</style>
</head>

<div id="flash" class="flash"></div>
<div class="header">
  <img src="icon-192.png" alt="logo" class="logo-img">
  <div class="brand">اللمسة الأخيرة</div>

<div class="wrap">
  <a href="index.html" class="back-link">← العودة للرئيسية</a>

  <div class="steps" id="stepper">

    <div class="card">

            <label>رقم الهاتف *</label>

  <div id="content-4" class="step-content">

      <a href="#" class="whatsapp-btn" id="wa-share">📱 شارك في واتساب</a><br>

<script>
(function(){
  'use strict';
  var CAPACITY = 4;
  var WEEKS_TO_SHOW = 8;
  var DAYS_AR = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];

  var allBookings = [];
  var state = {
    step:1, svc:'', wkKey:'', wkLabel:'', wkStart:'', wkEnd:'',
    pos:0, total:0, waiting:false,
    name:'', phone:'', plate:'', model:'', notes:''
  };

  function pad(n){ return n < 10 ? '0'+n : ''+n; }
  function fmtDate(dobj){ return DAYS_AR[dobj.getDay()] + ' ' + dobj.getDate() + '/' + (dobj.getMonth()+1); }
  function fmtISOLocal(d){ return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate()); }

  function flash(msg,type){
    var el = document.getElementById('flash');
    el.textContent = msg;
    el.className = 'flash ' + (type||'success');
    el.classList.add('show');
    setTimeout(function(){ el.classList.remove('show'); }, 3500);
  }

  function goToStep(n){
    document.querySelectorAll('.step-content').forEach(function(s){ s.classList.remove('active'); });
    document.getElementById('content-'+n).classList.add('active');
    for(var i=1; i<=4; i++){
      var s = document.getElementById('step-'+i);
      s.classList.remove('active','done');
      if(i < n) s.classList.add('done');
      if(i === n) s.classList.add('active');
    }
    state.step = n;
  }
  function nextStep(){ if(state.step < 4) goToStep(state.step+1); }
  function prevStep(){ if(state.step > 1) goToStep(state.step-1); }

  function getWeekRange(offset){
    var now = new Date();
    var d = new Date(now.getFullYear(), now.getMonth(), now.getDate());
    d.setDate(d.getDate() - d.getDay() + (offset * 7));
    var end = new Date(d.getFullYear(), d.getMonth(), d.getDate());
    end.setDate(end.getDate() + 6);
    return {
      key: fmtISOLocal(d), startISO: fmtISOLocal(d), endISO: fmtISOLocal(end),
      startObj: d, endObj: end,
      label: d.getDate()+'/'+(d.getMonth()+1)+' – '+end.getDate()+'/'+(end.getMonth()+1)
    };
  }

  function countBookingsInWeek(weekKey){
    return allBookings.filter(function(b){ return b.weekKey === weekKey && b.status !== 'cancelled'; }).length;
  }

  function renderWeeks(){
    var grid = document.getElementById('week-grid');
    var out = '';
    for(var i=0; i<WEEKS_TO_SHOW; i++){
      var w = getWeekRange(i);
      var count = countBookingsInWeek(w.key);
      var isFull = count >= CAPACITY;
      var taken = Math.min(count, CAPACITY);
      var wait = Math.max(0, count - CAPACITY);

      var dots = '';
      for(var j=0; j<CAPACITY; j++) dots += '<div class="wk-car-dot '+(j<taken?'taken':'empty')+'"></div>';
      if(wait>0) for(var j=0; j<Math.min(wait,3); j++) dots += '<div class="wk-car-dot wait" title="انتظار"></div>';

      var label = i===0?'هذا الأسبوع':i===1?'الأسبوع القادم':'الأسبوع '+(i+1);
      var statusText = isFull ? ('ممتلئ · '+wait+' بالانتظار') : ('متاح · '+(CAPACITY-count)+' من '+CAPACITY);
      var cls = isFull ? 'week-card full' : 'week-card';

      out += '<div class="'+cls+'" data-idx="'+i+'">';
      out += '<div class="wk-label">'+label+'</div>';
      out += '<div class="wk-range">'+fmtDate(w.startObj)+' – '+fmtDate(w.endObj)+'</div>';
      out += '<div class="wk-range-sub">'+w.startISO+' » '+w.endISO+'</div>';
      out += '<div class="wk-cars">'+dots+'</div>';
      out += '<div class="wk-status '+(isFull?'wk-full':'wk-free')+'">'+statusText+'</div>';
      out += '</div>';
    }
    grid.innerHTML = out;
    grid.querySelectorAll('.week-card').forEach(function(card){
      card.addEventListener('click', function(){ pickWeek(parseInt(card.getAttribute('data-idx'))); });
    });
  }

  function pickWeek(idx){
    var w = getWeekRange(idx);
    var count = countBookingsInWeek(w.key);
    var isFull = count >= CAPACITY;
    if(isFull && !confirm('هذا الأسبوع ممتلئ (٤ سيارات). تبي تنضم قائمة الانتظار؟')) return;

    document.querySelectorAll('.week-card').forEach(function(c){ c.classList.remove('selected'); });
    var cards = document.querySelectorAll('.week-card');
    if(cards[idx]) cards[idx].classList.add('selected');

    state.wkKey = w.key; state.wkLabel = w.label; state.wkStart = w.startISO; state.wkEnd = w.endISO; state.total = count;

    var qi = document.getElementById('queue-info');
    var qn = document.getElementById('queue-num');
    var qt = document.getElementById('queue-text');

    if(count >= CAPACITY){
      state.pos = count + 1; state.waiting = true;
      qi.className = 'queue-box show queue-wait';
      qn.textContent = '#'+state.pos;
      qt.textContent = 'أنت في قائمة الانتظار لهذا الأسبوع';
    } else {
      state.pos = count + 1; state.waiting = false;
      qi.className = 'queue-box show';
      qn.textContent = '#'+state.pos+' من '+CAPACITY;
      if(state.pos===1) qt.textContent = '🏆 أنت أول حاجز هذا الأسبوع!';
      else if(state.pos===CAPACITY) qt.textContent = 'آخر سيارة متاحة هذا الأسبوع!';
      else qt.textContent = 'سيارة '+state.pos+' من أصل '+CAPACITY;
    }
    document.getElementById('btn-next-2').disabled = false;
  }

  function submitBooking(){
    var name  = document.getElementById('cust-name').value.trim();
    var phone = document.getElementById('cust-phone').value.trim();
    var plate = document.getElementById('cust-plate').value.trim();
    var model = document.getElementById('cust-model').value.trim();
    var notes = document.getElementById('cust-notes').value.trim();
    if(!name || !phone || !plate){ flash('يرجى تعبئة الحقول المطلوبة *','error'); return; }

    state.name=name; state.phone=phone; state.plate=plate; state.model=model; state.notes=notes;
    var realCount = countBookingsInWeek(state.wkKey);
    if(realCount >= CAPACITY && !state.waiting){ state.waiting=true; state.pos=realCount+1; }

    var bkId = 'BK-'+Math.floor(10000+Math.random()*90000);

    db.collection('bookings').add({
      id:bkId, service:state.svc,
      weekKey:state.wkKey, weekLabel:state.wkLabel, weekStart:state.wkStart, weekEnd:state.wkEnd,
      position:state.pos, isWaiting:state.waiting,
      customerName:name, phone:phone, plate:plate, model:model, notes:notes,
      status:'pending', createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).then(function(){
      document.getElementById('confirm-id').textContent = bkId;
      var queueHtml;
      if(state.waiting){
        document.getElementById('confirm-wait-msg').textContent = 'هذا الأسبوع ممتلئ · أنت في قائمة الانتظار';
        queueHtml = '<div style="color:var(--gold);font-weight:700;">#'+state.pos+' في قائمة الانتظار</div><div style="font-size:12px;color:var(--muted);margin-top:4px;">سننبهك لو صار مكان متاح</div>';
      } else {
        document.getElementById('confirm-wait-msg').textContent = 'تم التأكيد · سيتم التواصل معك';
        queueHtml = '<div style="color:var(--success);font-weight:700;">#'+state.pos+' من '+CAPACITY+'</div><div style="font-size:12px;color:var(--muted);margin-top:4px;">أولوية الكاملة</div>';
      }
      document.getElementById('confirm-summary').innerHTML =
        '<div class="sum-row"><span class="sum-label">الاسم:</span><span class="sum-val">'+name+'</span></div>' +
        '<div class="sum-row"><span class="sum-label">الخدمة:</span><span class="sum-val">'+state.svc+'</span></div>' +
        '<div class="sum-row"><span class="sum-label">الأسبوع:</span><span class="sum-val">'+state.wkLabel+'</span></div>' +
        '<div class="sum-row"><span class="sum-label">اللوحة:</span><span class="sum-val">'+plate+'</span></div>';
      document.getElementById('confirm-queue').innerHTML = queueHtml;
      var msg = 'مرحباً%20اللمسة%20الأخيرة،%20أرغب%20في%20الاستفسار%20عن%20حجزي%20'+bkId+'%20'+name+'%20'+plate;
      document.getElementById('wa-share').href = 'https://wa.me/?text='+msg;
      goToStep(4);
    }).catch(function(err){
      console.error(err);
      flash('❌ خطأ في الحفظ: '+err.message, 'error');
    });
  }

  function initFirestore(){
    db.collection('bookings').onSnapshot(function(snap){
      allBookings = snap.docs.map(function(d){ return d.data(); });
      if(state.step === 2) renderWeeks();
    }, function(err){
      console.error('Firestore:', err);
      flash('⚠️ مشكلة في الاتصال بالسحابة','error');
    });
  }

  document.addEventListener('DOMContentLoaded', function(){
    initFirestore();
    var svcBody = document.getElementById('svc-body');
    var svcMech = document.getElementById('svc-mech');
    svcBody.addEventListener('click', function(){ svcBody.classList.add('selected'); svcMech.classList.remove('selected'); state.svc=svcBody.getAttribute('data-svc'); nextStep(); renderWeeks(); });
    svcMech.addEventListener('click', function(){ svcMech.classList.add('selected'); svcBody.classList.remove('selected'); state.svc=svcMech.getAttribute('data-svc'); nextStep(); renderWeeks(); });
    document.getElementById('btn-prev-2').addEventListener('click', prevStep);
    document.getElementById('btn-next-2').addEventListener('click', nextStep);
    document.getElementById('btn-prev-3').addEventListener('click', prevStep);
    document.getElementById('btn-submit').addEventListener('click', submitBooking);
  });
})();
</script>
</body>
</html>
